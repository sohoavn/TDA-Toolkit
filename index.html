 FALLBACK: ['gemini-2.5-flash-lite', 'gemini-2.0-flash-lite', 'gemini-1.5-flash-8b']
 };
 const prio = priorities[task] || priorities.STT;
 for (const p of prio) {
 if (modelList.some(m => m.name && m.name.includes(p.replace('gemini-','models/gemini-').split('models/')[1] || p))) {
 return p;
 }
 
 if (modelList.some(m => {
 const short = (m.name || '').replace('models/', '');
 return short === p || short.startsWith(p);
 })) return p;
 }
 
 const capable = modelList.find(m =>
 m.supportedGenerationMethods &&
 m.supportedGenerationMethods.includes('generateContent') &&
 (m.name||'').includes('gemini')
 );
 return capable ? (capable.name||'').replace('models/','') : MODELS[task];
}

function blobToBase64(blob) {
 return new Promise((resolve, reject) => {
 const r = new FileReader();
 r.onloadend = () => resolve(r.result.split(',')[1]);
 r.onerror = reject;
 r.readAsDataURL(blob);
 });
}
function fileToBase64(file) {
 return new Promise((resolve, reject) => {
 const r = new FileReader();
 r.onloadend = () => resolve(r.result.split(',')[1]);
 r.onerror = reject;
 r.readAsDataURL(file);
 });
}

 for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
 return arr;
}
function addWavHeader(pcm, sr=24000, ch=1, bits=16) {
 const byteRate = sr * ch * (bits/8);
 const blockAlign = ch * (bits/8);
 const sz = pcm.length;
 const buf = new ArrayBuffer(44 + sz);
 const v = new DataView(buf);
 const w = (o,s) => { for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
 w(0,'RIFF'); v.setUint32(4,36+sz,true); w(8,'WAVE'); w(12,'fmt ');
 v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,ch,true);
 v.setUint32(24,sr,true); v.setUint32(28,byteRate,true);
 v.setUint16(32,blockAlign,true); v.setUint16(34,bits,true);
 w(36,'data'); v.setUint32(40,sz,true);
 new Uint8Array(buf).set(pcm,44);
 return buf;
}


const keyMgr = {
 keys: [], idx: 0, failed: new Set(),
 load() {
 try {
 const s = localStorage.getItem('ttd_api_keys');
 if (s) this.keys = JSON.parse(s).filter(k => k && k.trim());
 const i = localStorage.getItem('ttd_api_key_index');
 if (i !== null) this.idx = parseInt(i,10);
 if (this.idx >= this.keys.length) this.idx = 0;
 } catch(e) { this.keys=[]; this.idx=0; }
 },
 save() {
 localStorage.setItem('ttd_api_keys', JSON.stringify(this.keys));
 localStorage.setItem('ttd_api_key_index', String(this.idx));
 },
 
 addKey(key) {
 const k = key.trim();
 if (!k || k.length < 10) return false;
 if (this.keys.includes(k)) return 'exists';
 this.keys.push(k);
 this.save();
 return true;
 },
 removeKey(idx) {
 this.keys.splice(idx, 1);
 if (this.idx >= this.keys.length) this.idx = Math.max(0, this.keys.length - 1);
 this.save();
 },
 
 maskedKey(k) {
 if (!k) return '—';
 if (k.length <= 12) return '•'.repeat(k.length);
 return k.slice(0,6) + '•'.repeat(k.length - 10) + k.slice(-4);
 },
 get() { return this.keys.length ? this.keys[Math.min(this.idx, this.keys.length-1)] : null; },
 masked() { const k=this.get(); return k ? this.maskedKey(k) : '—'; },
 rotate() {
 if (this.keys.length <= 1) return false;
 this.failed.add(this.keys[this.idx]);
 const start = this.idx;
 do {
 this.idx = (this.idx+1) % this.keys.length;
 if (!this.failed.has(this.keys[this.idx])) { this.save(); return true; }
 } while (this.idx !== start);
 return false;
 },
 count() { return this.keys.length; },
 
 setKeys(txt) {
 this.keys = txt.split(/[\n,]+/).map(k=>k.trim()).filter(k=>k.length>10);
 this.idx = 0; this.failed.clear(); this.save();
 },
 text() { return this.keys.join('\n'); }
};
keyMgr.load();


const API_BASE = 'https://generativelanguage.googleapis.com/v1beta';

async function geminiCall(model, body, retry=true) {
 const key = keyMgr.get();
 if (!key) throw new Error('NO_API_KEY');
 const r = await fetch(`${API_BASE}/models/${model}:generateContent?key=${key}`, {
 method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
 });
 if (r.status === 429 || r.status === 403) {
 if (retry && keyMgr.rotate()) return geminiCall(model, body, true);
 const e = await r.json().catch(()=>({}));
 throw new Error('QUOTA: '+(e?.error?.message||'Rate limited'));
 }
 if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${r.status}`); }
 return r.json();
}


async function loadGeminiModels() {
 const key = keyMgr.get();
 if (!key) throw new Error('NO_API_KEY');
 const r = await fetch(`${API_BASE}/models?key=${key}&pageSize=100`);
 if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${r.status}`); }
 const d = await r.json();

}

async function generateSpeech(text, voice='Puck') {
 const m = MODELS.TTS;
 const key = keyMgr.get();
 if (!key) throw new Error('NO_API_KEY');
 const r = await fetch(`${API_BASE}/models/${m}:generateContent?key=${key}`, {
 method:'POST', headers:{'Content-Type':'application/json'},
 body: JSON.stringify({
 contents:[{ parts:[{text}] }],
 generationConfig: {
 responseModalities:['AUDIO'],
 speechConfig:{ voiceConfig:{ prebuiltVoiceConfig:{ voiceName:voice } } }
 }
 })
 });
 if (r.status===429||r.status===403) {
 if (keyMgr.rotate()) return generateSpeech(text, voice);
 throw new Error('QUOTA_EXHAUSTED');
 }
 if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${r.status}`); }
 const d = await r.json();
 const a64 = d?.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
 if (!a64) throw new Error('No audio data');
 const pcm = base64ToUint8Array(a64);
 const wav = addWavHeader(pcm);
 const blob = new Blob([wav],{type:'audio/wav'});
 return { url:URL.createObjectURL(blob), blob, model:m };
}

 setPermErr('');

 audio: { echoCancellation:true, noiseSuppression:true, sampleRate:44100 }
 });
 const mtype = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
 ? 'audio/webm;codecs=opus' : 'audio/webm';
 const mr = new MediaRecorder(stream, { mimeType: mtype });
 chunks.current = [];

 mr.onstop = () => {

 if (onDone) onDone(b);

function BatchConverter({ lang, tc }) {
 const t = T[lang];
 const [files, setFiles] = useState([]); 
 const [fmt, setFmt] = useState('word');
 const [processing, setProcessing] = useState(false);
 const [zipReady, setZipReady] = useState(false);
 const [zipUrl, setZipUrl] = useState(null);
 const fileInputRef = useRef(null);

 const addFiles = (newFiles) => {
 const items = Array.from(newFiles).map(f => ({
 id: `${f.name}_${Date.now()}_${Math.random()}`,
 file: f, status: 'pending', result: '', error: ''
 }));
 setFiles(prev => [...prev, ...items]);
 setZipReady(false);
 if(zipUrl) { URL.revokeObjectURL(zipUrl); setZipUrl(null); }
 };

 const removeFile = (id) => {
 setFiles(prev => prev.filter(f => f.id !== id));
 setZipReady(false);
 };

 const processAll = async () => {
 const pending = files.filter(f => f.status === 'pending' || f.status === 'error');
 if (!pending.length) return;
 setProcessing(true);
 setZipReady(false);

 for (const item of pending) {
 
 setFiles(prev => prev.map(f => f.id === item.id ? {...f, status:'processing'} : f));
 try {
 const b64 = await fileToBase64(item.file);
 const mime = item.file.type || 'application/octet-stream';
 const r = await analyzeDocument(b64, mime, fmt);
 setFiles(prev => prev.map(f => f.id === item.id ? {...f, status:'done', result: r.text, error:''} : f));
 } catch(e) {
 setFiles(prev => prev.map(f => f.id === item.id ? {...f, status:'error', error: e.message} : f));
 }
 }
 setProcessing(false);
 setZipReady(true);
 };

 const downloadZip = async () => {
 if (!window.JSZip) { alert('JSZip not loaded'); return; }
 const zip = new JSZip();

 
 const extMap = { word:'doc', excel:'xls', ppt:'ppt' };
 const mimeMap = {
 word: "application/msword",
 excel: "application/vnd.ms-excel",
 ppt: "application/vnd.ms-powerpoint"
 };

 
 const wrapContent = (content, format) => {
 if (format === 'excel') {
 return [
 '<html xmlns:o="urn:schemas-microsoft-com:office:office"',
 '      xmlns:x="urn:schemas-microsoft-com:office:excel"',
 '      xmlns="http://www.w3.org/TR/REC-html40">',
 '<head><meta http-equiv="Content-Type" content="text/html; charset=utf-8">',
 '<style>table{border-collapse:collapse}td,th{border:1px solid #d1d5db;padding:6pt 10pt}th{background:#1e3a5f;color:white}</style>',
 '</head><body>', content, '</body></html>'
 ].join('\n');
 }
 if (format === 'word') {
 return [
 "<html xmlns:o='urn:schemas-microsoft-com:office:office'",
 "      xmlns:w='urn:schemas-microsoft-com:office:word'",
 "      xmlns='http://www.w3.org/TR/REC-html40'>",
 "<head><meta charset='utf-8'>",
 "<style>body{font-family:Calibri;font-size:12pt;margin:2cm;line-height:1.6}h1,h2{color:#1e3a5f}</style>",
 "</head><body>", content, "</body></html>"
 ].join('\n');
 }
 
 return [
 "<html xmlns:o='urn:schemas-microsoft-com:office:office'",
 "      xmlns:p='urn:schemas-microsoft-com:office:powerpoint'",
 "      xmlns='http://www.w3.org/TR/REC-html40'>",
 "<head><meta charset='utf-8'>",
 "<style>body{font-family:'Segoe UI';background:#f8fafc;padding:24px}",
 "section{background:white;border-radius:12px;padding:40px;margin:24px auto;max-width:800px;border-left:6px solid #6366f1;page-break-after:always}</style>",
 "</head><body>", content, "</body></html>"
 ].join('\n');
 };

 const doneFiles = files.filter(f => f.status === 'done' && f.result);

 doneFiles.forEach(item => {
 const ext = extMap[fmt] || 'doc';
 
 const baseName = item.file.name.replace(/\.[^/.]+$/, '');
 const fileName = `${baseName}_converted.${ext}`;
 const wrapped = wrapContent(item.result, fmt);
 zip.file(fileName, wrapped);
 });

 
 const blob = await zip.generateAsync({ type:'blob', compression:'DEFLATE', compressionOptions:{ level:6 } });
 if (zipUrl) URL.revokeObjectURL(zipUrl);
 const url = URL.createObjectURL(blob);
 setZipUrl(url);
 const a = document.createElement('a');
 a.href = url;
 a.download = `TANDIGITAL_batch_${fmt}_${Date.now()}.zip`;
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);
 };

 const getStatusColor = (s) => ({
 pending:'#94a3b8', processing:'#f59e0b', done:'#10b981', error:'#ef4444'
 }[s] || '#94a3b8');

 const getStatusLabel = (s) => ({
 pending: t.batchPending,
 processing: t.batchProcessing,
 done: t.batchDone,
 error: t.batchError
 }[s] || s);

 const doneCount = files.filter(f=>f.status==='done').length;

 return (
 <div className="space-y-4 animate-fade-in">
 <div className="p-4 rounded-2xl mica-light">
 <div className="flex items-center gap-2 text-sm font-medium" style={{opacity:0.8}}>
 <Ico d={ICO.package} size={16}/> {t.batchHint}
 </div>
 </div>

 {}
 <div className="p-5 rounded-2xl mica-light">
 <h3 className="section-title mb-3">{t.selectFormat}</h3>
 <div className="flex gap-2 flex-wrap">
 {['word','excel','ppt'].map(f=>(
 <button key={f} onClick={()=>setFmt(f)}
 className={`px-5 py-2.5 rounded-xl text-base font-bold transition-all border-2 ${fmt===f?'text-white border-transparent':'border-gray-200 dark:border-gray-700 hover:border-gray-300'}`}
 style={fmt===f?{background:tc.primary}:{}}>
 {t[f]}
 </button>
 ))}
 </div>
 </div>

 {}
 <div className="p-5 rounded-2xl mica-light">
 <h3 className="section-title mb-3">{t.batchAdd}</h3>
 <label className="flex flex-col items-center p-6 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl cursor-pointer hover:border-gray-400 transition-colors">
 <Ico d={ICO.upload} size={36} cls="opacity-50 mb-2"/>
 <span className="text-base font-semibold opacity-75">{t.uploadFileHint}</span>
 <span className="text-sm font-medium mt-1" style={{color:tc.primary}}>
 {files.length > 0 ? `${files.length} file đã thêm` : 'Chọn nhiều file cùng lúc'}
 </span>
 <input ref={fileInputRef} type="file"
 accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.bmp,.tiff"
 multiple
 onChange={e=>{if(e.target.files.length>0) addFiles(e.target.files); e.target.value='';}}
 className="hidden"/>
 </label>
 </div>

 {}
 {files.length > 0 && (
 <div className="p-5 rounded-2xl mica-light">
 <div className="flex items-center justify-between mb-3">
 <h3 className="section-title">Danh sách file ({files.length})</h3>
 <button onClick={()=>{setFiles([]); setZipReady(false);}}
 className="text-xs font-semibold text-red-500 hover:text-red-600 px-3 py-1.5 rounded-lg bg-red-50 dark:bg-red-900/20">
 Xoá tất cả
 </button>
 </div>
 <div style={{maxHeight:'280px',overflowY:'auto'}}>
 {files.map(item => (
 <div key={item.id} className="batch-item">
 <span className="batch-status-dot" style={{background:getStatusColor(item.status)}}/>
 <span className="flex-1 text-sm font-medium truncate" style={{maxWidth:'200px'}} title={item.file.name}>
 {item.file.name}
 </span>
 <span className="text-xs font-semibold px-2 py-1 rounded-full" style={{
 background: getStatusColor(item.status)+'22',
 color: getStatusColor(item.status)
 }}>
 {getStatusLabel(item.status)}
 </span>
 {item.status === 'error' && (
 <span className="text-xs text-red-500 truncate" style={{maxWidth:'100px'}} title={item.error}>
 {item.error}
 </span>
 )}
 {item.status === 'pending' && (
 <button onClick={()=>removeFile(item.id)} className="text-gray-400 hover:text-red-500 transition-colors ml-1">
 <Ico d={ICO.x} size={16}/>
 </button>
 )}
 </div>
 ))}
 </div>
 </div>
 )}

 {}
 {files.length > 0 && (
 <div className="flex gap-3 flex-wrap">
 <button onClick={processAll} disabled={processing || !files.some(f=>f.status==='pending'||f.status==='error')}
 className="btn-primary flex items-center gap-2 text-white disabled:opacity-40"
 style={{background:processing?'#6b7280':tc.primary}}>
 {processing ? <><Spinner size={20}/> {t.batchProcessing}</> : <><Ico d={ICO.sparkles} size={20}/> {t.batchProcess}</>}
 </button>

 {zipReady && doneCount > 0 && (
 <button onClick={downloadZip}
 className="btn-primary flex items-center gap-2 text-white"
 style={{background:'#10b981'}}>
 <Ico d={ICO.download} size={20}/> {t.batchDownloadZip} ({doneCount})
 </button>
 )}
 </div>
 )}

 {}
 {files.length > 0 && (
 <div className="flex gap-3 flex-wrap text-sm font-medium">
 <span className="px-3 py-1.5 rounded-full bg-gray-200 dark:bg-gray-700">
 Tổng: {files.length}
 </span>
 <span className="px-3 py-1.5 rounded-full" style={{background:'rgba(16,185,129,0.12)',color:'#10b981'}}>
 Xong: {doneCount}
 </span>
 {files.some(f=>f.status==='error') && (
 <span className="px-3 py-1.5 rounded-full" style={{background:'rgba(239,68,68,0.12)',color:'#ef4444'}}>
 Lỗi: {files.filter(f=>f.status==='error').length}
 </span>
 )}
 </div>
 )}
 </div>
 );
}


function DocumentConverter({ lang, tc }) {
 const t = T[lang];
 const [mode, setMode] = useState('single');
 const [file, setFile] = useState(null);
 const [fmt, setFmt] = useState('word');
 const [result, setResult] = useState('');
 const [loading, setLoading] = useState(false);
 const [err, setErr] = useState('');
 const [mdl, setMdl] = useState('');

 
 const go = async () => {
 if (!file) return;
 setLoading(true); setErr(''); setResult('');
 try {
 const b64 = await fileToBase64(file);
 const r = await analyzeDocument(b64, file.type || 'application/pdf', fmt);
 setResult(r.text); setMdl(r.model);
 } catch(e) {
 setErr(e.message === 'NO_API_KEY' ? t.noApiKey : e.message);
 } finally { setLoading(false); }
 };

 
 const convDownload = () => {
 if (!result) return;

 let mime, ext, content;

 if (fmt === 'excel') {
 
 mime = 'application/vnd.ms-excel';
 ext = 'xls';
 content = [
 '<html xmlns:o="urn:schemas-microsoft-com:office:office"',
 '      xmlns:x="urn:schemas-microsoft-com:office:excel"',

 '  </style>',
 '</head>',
 '<body>',
 result,
 '</body></html>'
 ].join('\n');

 } else if (fmt === 'word') {
 
 mime = 'application/msword';
 ext = 'doc';
 content = [

 ].join('\n');

 } else {
 
 
 
 mime = 'application/vnd.ms-powerpoint';
 ext = 'ppt';
 content = [
 "<html xmlns:o='urn:schemas-microsoft-com:office:office'",
 "      xmlns:p='urn:schemas-microsoft-com:office:powerpoint'",
 "      xmlns='http://www.w3.org/TR/REC-html40'>",
 "<head>",
 "  <meta charset='utf-8'>",
 "  <style>",
 "    body    { font-family: 'Segoe UI', Calibri; background: #f8fafc; margin: 0; padding: 24px; }",
 "    section { background: white; border-radius: 12px; padding: 40px 48px; margin: 24px auto;",
 "              max-width: 800px; box-shadow: 0 4px 24px rgba(0,0,0,0.10);",
 "              border-left: 6px solid #6366f1; page-break-after: always; }",
 "    h1,h2   { color: #1e293b; margin: 0 0 16px; }",
 "    h1      { font-size: 28px; font-weight: 900; }",
 "    h2      { font-size: 20px; font-weight: 700; color: #6366f1; }",
 "    ul,ol   { padding-left: 24px; }",
 "    li      { margin-bottom: 8px; font-size: 15px; color: #334155; }",
 "    p       { color: #475569; line-height: 1.7; }",
 "  </style>",
 "</head>",
 "<body>",
 result,
 "</body></html>"
 ].join('\n');
 }

 
 const blob = new Blob([content], { type: mime + ';charset=utf-8' });
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 
 const baseName = file
 ? file.name.replace(/\.[^/.]+$/, '') 
 : 'TANDIGITAL_Converted';
 a.href = url;
 a.download = `${baseName}_converted.${ext}`;
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);
 URL.revokeObjectURL(url);
 };

 
 const FORMAT_OPTIONS = [

 ),
 color: '#2563eb', bg: 'rgba(37,99,235,0.08)', ext: '.doc'

 {
 id: 'excel',
 label: 'Microsoft Excel',
 desc: 'Extract data grid',

 ),

 },

 return (

function SettingsPanel({ lang, tc, dark, setDark, themeColor, setThemeColor, bgType, setBgType, onClose }) {
 const t = T[lang];
 const [keyInput, setKeyInput] = useState('');
 const [keyMsg, setKeyMsg] = useState('');
 const [keyMsgType, setKeyMsgType] = useState('');
 const [showKeys, setShowKeys] = useState({});
 const [keys, setKeys] = useState([...keyMgr.keys]);

 
 const [modelList, setModelList] = useState([]);
 const [loadingModels, setLoadingModels] = useState(false);
 const [modelMsg, setModelMsg] = useState('');
 const [activeModels, setActiveModels] = useState({...MODELS});

 const refreshKeys = () => setKeys([...keyMgr.keys]);

 
 const addKey = () => {
 const k = keyInput.trim();
 if (!k) return;
 const res = keyMgr.addKey(k);
 if (res === 'exists') {
 setKeyMsg(t.keyExists); setKeyMsgType('warn');
 } else if (res === true) {
 setKeyInput('');
 setKeyMsg(t.keyAdded + ' ' + t.keyHidden);
 setKeyMsgType('ok');
 refreshKeys();
 } else {
 setKeyMsg('Key không hợp lệ (quá ngắn).'); setKeyMsgType('warn');
 }
 setTimeout(()=>setKeyMsg(''),3000);
 };

 const removeKey = (i) => {
 keyMgr.removeKey(i);
 refreshKeys();
 };

 const toggleShow = (i) => setShowKeys(p => ({...p, [i]: !p[i]}));

 
 const doLoadModels = async () => {
 setLoadingModels(true); setModelMsg('');
 try {
 const list = await loadGeminiModels();
 setModelList(list);
 
 const updated = { ...MODELS };
 updated.STT = pickBestModel(list, 'STT');
 updated.TTS = pickBestModel(list, 'TTS');
 updated.VIDEO = pickBestModel(list, 'VIDEO');
 updated.DOCUMENT = pickBestModel(list, 'DOCUMENT');
 updated.FALLBACK = pickBestModel(list, 'FALLBACK');
 Object.assign(MODELS, updated);
 setActiveModels({...MODELS});
 setModelMsg(`✓ ${t.modelsLoaded} ${list.length} ${t.modelsFound}`);
 } catch(e) {
 setModelMsg('⚠ ' + e.message);
 } finally {
 setLoadingModels(false);
 }
 };

 return (
 <div className="fixed inset-0 z-50 flex items-start justify-end p-4 pt-16">
 <div className="absolute inset-0 bg-black/30 backdrop-blur-sm" onClick={onClose}/>
 <div className="mica rounded-3xl p-6 w-full max-w-sm relative z-10 space-y-6 max-h-screen overflow-y-auto animate-fade-in" style={{maxHeight:'calc(100vh - 80px)'}}>

 {}

 {}
